info:
  name: Workflows Create
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/workflows/create-v2/"
  body:
    type: json
    data: |-
      {
          "loan_id": {{loan_id}},
          "source": "ai-uw-app"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setEnvVar("workflow_run_id", res.body.id);
        bru.setEnvVar("workflow_id", res.body.workflow_loan_summary);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
