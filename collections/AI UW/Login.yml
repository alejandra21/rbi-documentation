info:
  name: Login
  type: http
  seq: 16

http:
  method: POST
  url: "{{base_url}}/api/token/"
  body:
    type: json
    data: |-
      {
          "username": "{{email}}",
          "password": "{{password}}"
      }

runtime:
  scripts:
    - type: after-response
      code: bru.setVar("access_token", res.body.access);
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.access
        method: jsonq
      variable:
        name: access_token
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
