info:
  name: Login
  type: http
  seq: 16

http:
  method: POST
  url: "{{base_url}}/api/token/"
  body:
    type: json
    data: |-
      {
          "username": "{{email}}",
          "password": "{{password}}"
      }

runtime:
  scripts:
    - type: after-response
      code: bru.setEnvVar("access_token", res.body.access);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
