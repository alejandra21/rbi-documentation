info:
  name: Borrower Eligibility Validations
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/api/workflows/borrower-eligibility-validations"
  body:
    type: json
    data: |-
      {
          "workflow_loan_summary": "{{workflow_id}}",
          "entity_name": "",
          "entity_type": ""
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setEnvVar("phase_summary_phase_1", res.body.id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
