info:
  name: Refresh
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/user/refresh"
  headers:
    - name: Content-Type
      value: application/json
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setVar("jwt_token", res.body.token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
