info:
  name: Sign In
  type: http
  seq: 1

http:
  method: POST
  url: "{{public_url}}/sign-in"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "{{email}}",
        "password": "{{password}}"
      }

runtime:
  scripts:
    - type: after-response
      code: bru.setVar("jwt_token", res.body.token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
