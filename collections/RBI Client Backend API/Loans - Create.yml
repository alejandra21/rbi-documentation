info:
  name: Loans - Create
  type: http
  seq: 42

http:
  method: POST
  url: "{{base_url}}/panel/create-loan"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{jwt_token}}
  body:
    type: json
    data: |-
      {
        "amount": 100000
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
