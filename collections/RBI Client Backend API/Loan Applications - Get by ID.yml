info:
  name: Loan Applications - Get by ID
  type: http
  seq: 25

http:
  method: GET
  url: "{{private_url}}/loan-applications/:id"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{jwt_token}}
  params:
    - name: id
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
