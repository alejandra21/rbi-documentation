info:
  name: Credit - FICO Score
  type: http
  seq: 5

http:
  method: POST
  url: "{{private_url}}/credit/fico-score"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "first_name": "John",
        "last_name": "Doe",
        "ssn": "123-45-6789",
        "dob": "1980-01-01",
        "address": "123 Main St, City, State, 12345"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
