info:
  name: Loan Applications - Save Terms
  type: http
  seq: 8

http:
  method: POST
  url: "{{base_url}}/loan-applications/terms"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "applicationId": 1,
        "loanAmount": 200000
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
