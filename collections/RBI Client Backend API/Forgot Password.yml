info:
  name: Forgot Password
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/forgot-password"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "user@example.com"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
