info:
  name: Loan Applications - Sign Terms
  type: http
  seq: 9

http:
  method: PUT
  url: "{{base_url}}/loan-applications/terms/sign"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "loanApplicationId": 1,
        "termId": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
