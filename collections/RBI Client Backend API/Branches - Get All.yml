info:
  name: Branches - Get All
  type: http
  seq: 30

http:
  method: GET
  url: "{{base_url}}/branches"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{jwt_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
