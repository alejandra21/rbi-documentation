info:
  name: User - Change Password
  type: http
  seq: 21

http:
  method: POST
  url: "{{base_url}}/change-password"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{jwt_token}}
  body:
    type: json
    data: |-
      {
        "old_password": "current_password",
        "new_password": "new_password"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
