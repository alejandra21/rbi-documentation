                                  </div>
                                  <div class="card-body">
                                      <pre class="bg-light p-3 rounded">
                                          <code>{
            "data": {
              "report_file": "https://your-api-domain.com/reports/USPS - 123 Main St.pdf"
            },
            "message": "Address Not Found",
            "status": "Failed",
            "success": true
          }</code>
                                      </pre>
                                      <div class="alert alert-success mt-2">
                                          <small>
                                              <i class="fas fa-info-circle me-2"></i>
                                  When
                                              <code>success: true</code> and
                                              <code>report_file</code> is present, PDF viewing buttons will appear. The URL is used directly from the API response. Try different download methods if one doesn't work.
                                          </small>
