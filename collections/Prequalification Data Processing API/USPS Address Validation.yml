                                      <div class="alert alert-info mt-3">
                                          <small>
                                              <i class="fas fa-lightbulb me-2"></i>
                                              <strong>Tip:</strong> The USPS API will validate and standardize the address format according to USPS standards. Optional fields will be sent as null if left empty. When a PDF report is generated, you'll see view and download buttons.
                                          </small>
