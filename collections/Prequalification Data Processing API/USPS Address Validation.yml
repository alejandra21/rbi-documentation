                  <!-- Scripts -->
                  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
                  <script>
                  // Common JavaScript functions
                  function showLoading() {
                      document.querySelector('.loading').classList.add('show');
                  }

                  function hideLoading() {
                      document.querySelector('.loading').classList.remove('show');
                  }

                  function showResult(data) {
                      const resultSection = document.querySelector('.result-section');
                      const errorSection = document.querySelector('.error-section');
                      
                      if (resultSection) {
                          resultSection.style.display = 'block';
                          resultSection.innerHTML = `
                              
                      <h5>
                          <i class="fas fa-check-circle text-success me-2"></i>API Response
                      </h5>
                      <pre class="bg-white p-3 rounded border">${JSON.stringify(data, null, 2)}</pre>
                          `;
                      }
                      
                      if (errorSection) {
                          errorSection.style.display = 'none';
                      }
                  }

                  function showError(error) {
                      const resultSection = document.querySelector('.result-section');
                      const errorSection = document.querySelector('.error-section');
                      
                      if (errorSection) {
                          errorSection.style.display = 'block';
                          errorSection.innerHTML = `
                      <h5>
                          <i class="fas fa-exclamation-triangle text-danger me-2"></i>Error
                      </h5>
                      <p class="mb-0">${error}</p>
                          `;
                      }
                      
                      if (resultSection) {
                          resultSection.style.display = 'none';
                      }
                  }

                  function clearResults() {
                      const resultSection = document.querySelector('.result-section');
                      const errorSection = document.querySelector('.error-section');
                      
                      if (resultSection) resultSection.style.display = 'none';
                      if (errorSection) errorSection.style.display = 'none';
                  }

                  // Form validation helper
                  function validateForm(formId) {
                      const form = document.getElementById(formId);
                      if (!form.checkValidity()) {
                          form.classList.add('was-validated');
                          return false;
                      }
                      return true;
                  }
                  </script>
                  <script>
          // Override the base showResult function for USPS-specific PDF handling
          function showResult(data) {
              const resultSection = document.querySelector('.result-section');
              const errorSection = document.querySelector('.error-section');
              
              if (resultSection) {
                  resultSection.style.display = 'block';
                  
                  // Check if PDF was generated successfully
                  let resultContent = '';
                  
                  if (data.success === true && data.data && data.data.report_file) {
                      // PDF was generated successfully
                      resultContent = `
                          
                      <h5>
                          <i class="fas fa-check-circle text-success me-2"></i>API Response
                      </h5>
                      <div class="alert alert-info mb-3">
                          <i class="fas fa-file-pdf me-2"></i>
                          <strong>PDF Generated Successfully!</strong>
                          <br>
                          <small>File: ${data.data.report_file}</small>
                      </div>
                      <div class="mb-3">
                          <button class="btn btn-primary me-2" onclick="viewPDF('${data.data.report_file}')">
                              <i class="fas fa-eye me-2"></i>View PDF
                          </button>
                          <button class="btn btn-success me-2" onclick="downloadPDF('${data.data.report_file}')">
                              <i class="fas fa-download me-2"></i>Download PDF
                          </button>
                      </div>
                      <h6>Full Response:</h6>
                      <pre class="bg-white p-3 rounded border">${JSON.stringify(data, null, 2)}</pre>
                      `;
                  } else {
                      // Regular response without PDF
                      resultContent = `
                      <h5>
                          <i class="fas fa-check-circle text-success me-2"></i>API Response
                      </h5>
                      <pre class="bg-white p-3 rounded border">${JSON.stringify(data, null, 2)}</pre>
                      `;
                  }
                  
                  resultSection.innerHTML = resultContent;
              }
              
              if (errorSection) {
                  errorSection.style.display = 'none';
              }
          }

          // PDF viewing functions
          function viewPDF(filename) {
              // Open PDF using the direct URL provided by the API
              window.open(filename, '_blank');
          }

          function downloadPDF(filename) {
              console.log('Attempting to download:', filename);
              
              // Extract filename from URL
              const downloadName = filename.split('/').pop() || 'document.pdf';
              
              // Method 1: Try fetch and blob download (most reliable)
              fetch(filename, {
                  method: 'GET',
                  mode: 'cors',
                  headers: {
                      'Accept': 'application/pdf, application/octet-stream, */*',
                  }
              })
              .then(response => {
                  console.log('Fetch response:', response.status, response.statusText);
                  if (!response.ok) {
                      throw new Error(`HTTP error! status: ${response.status}`);
                  }
                  return response.blob();
              })
              .then(blob => {
                  console.log('Blob created, size:', blob.size);
                  
                  // Create blob URL
                  const blobUrl = window.URL.createObjectURL(blob);
                  
                  // Create download link
                  const link = document.createElement('a');
                  link.href = blobUrl;
                  link.download = downloadName;
                  link.style.display = 'none';
                  
                  // Add to DOM, click, and remove
                  document.body.appendChild(link);
                  link.click();
                  document.body.removeChild(link);
                  
                  // Clean up blob URL
                  setTimeout(() => {
                      window.URL.revokeObjectURL(blobUrl);
                  }, 100);
                  
                  console.log('Download initiated successfully');
              })
              .catch(error => {
                  console.error('Fetch download failed:', error);
                  
                  // Method 2: Fallback to direct link (may open in browser)
                  console.log('Trying direct link method...');
                  const link = document.createElement('a');
                  link.href = filename;
                  link.download = downloadName;
                  link.target = '_blank';
                  link.style.display = 'none';
                  
                  document.body.appendChild(link);
                  link.click();
                  document.body.removeChild(link);
                  
                  console.log('Direct link method attempted');
              });
          }

          document.getElementById('uspsForm').addEventListener('submit', async function(e) {
              e.preventDefault();
              
              if (!validateForm('uspsForm')) {
                  return;
              }
              
              clearResults();
              showLoading();
              
              const formData = new FormData(this);
              const data = Object.fromEntries(formData.entries());
              
              // Convert empty strings to null for optional fields
              const optionalFields = ['secondary_address', 'zip', 'zip4'];
              optionalFields.forEach(field => {
                  if (data[field] === '') {
                      data[field] = null;
                  }
              });
              
              // Debug: Log the data being sent
              console.log('USPS API Request Data:', data);
              
              try {
                  const response = await fetch('/prequal/usps', {
                      method: 'POST',
                      headers: {
                          'Content-Type': 'application/json',
                      },
                      body: JSON.stringify(data)
                  });
                  
                  const result = await response.json();
                  
                  if (response.ok) {
                      showResult(result);
                  } else {
                      showError(result.error || 'An error occurred while validating the address');
                  }
              } catch (error) {
                  showError('Network error: ' + error.message);
              } finally {
                  hideLoading();
              }
          });

          // Auto-format state input
          document.getElementById('state').addEventListener('input', function(e) {
              e.target.value = e.target.value.toUpperCase();
          });

          // Auto-format ZIP code
          document.getElementById('zip').addEventListener('input', function(e) {
              let value = e.target.value.replace(/\D/g, '');
              if (value.length > 5) {
                  value = value.substring(0, 5) + '-' + value.substring(5, 9);
              }
              e.target.value = value;
          });
                  </script>
              </body>
          </html>
