                                              <i class="fas fa-check text-success me-2"></i>Street Address
                                          </li>
                                          <li>
                                              <i class="fas fa-check text-success me-2"></i>City
                                          </li>
                                          <li>
                                              <i class="fas fa-check text-success me-2"></i>State
                                          </li>
                                      </ul>
                                      <h6 class="mt-3">Optional Fields:</h6>
                                      <ul class="list-unstyled">
                                          <li>
                                              <i class="fas fa-info text-info me-2"></i>Secondary Address
                                          </li>
                                          <li>
                                              <i class="fas fa-info text-info me-2"></i>ZIP Code
                                          </li>
                                          <li>
                                              <i class="fas fa-info text-info me-2"></i>ZIP+4
                                          </li>
