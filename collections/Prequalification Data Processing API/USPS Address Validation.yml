info:
  name: USPS Address Validation
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/usps"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "loan_id": "LN-10001",
        "street_address": "1600 Pennsylvania Ave NW",
        "city": "Washington",
        "state": "DC",
        "zip": "20500"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

