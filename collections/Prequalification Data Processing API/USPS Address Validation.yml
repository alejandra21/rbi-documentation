                                      </h5>
                                  </div>
                                  <div class="card-body">
                                      <pre class="bg-light p-3 rounded">
                                          <code>{
            "loan_id": "LOAN123456",
            "street_address": "123 Main St",
            "city": "New York",
            "state": "NY",
            "zip": "10001",
            "secondary_address": null,
            "zip4": null
          }</code>
                                      </pre>
                                  </div>
                              </div>
                              <div class="card mt-3">
                                  <div class="card-header">
                                      <h5 class="mb-0">
                                          <i class="fas fa-file-pdf me-2"></i>Sample PDF Response
