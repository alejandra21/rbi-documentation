info:
  name: Hard Credit Pull
  type: http
  seq: 5

http:
  method: POST
  url: "{{url}}/hard-pull"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |
      {
        "loan_id": "LN-10004",
        "first_name": "Jane",
        "last_name": "Smith",
        "ssn": "123456789",
        "date_of_birth": "1985-07-20",
        "street_address": "456 Oak Ave",
        "city": "Los Angeles",
        "state": "CA",
        "zip_code": "90001"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
