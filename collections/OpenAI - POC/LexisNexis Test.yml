info:
  name: LexisNexis Test
  type: http
  seq: 2

http:
  method: POST
  url: https://api.openai.com/v1/chat/completions
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "model": "{{open_ai_ocr_model}}",
          "messages": [
              {
                  "role": "user",
                  "content": [
                      {
                          "type": "file",
                          "file": {
                              "file_id": "{{file_id}}"
                          }
                      },
                      {
                          "type": "text",
                          "text": "Extract all the text from the document tables. Return a toon."
                      }
                  ]
              }
          ]
      }
  auth:
    type: bearer
    token: "{{OPEN_AI_API_KEY}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
